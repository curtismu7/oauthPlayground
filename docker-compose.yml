# OAuth Playground — Docker Compose
#
# Runs alongside AI-Demo without port conflicts.
# AI-Demo uses: 5001 (BFF), 4000 (UI), 8080–8895, 9001, 3005, 3009, 3016, 3036
# This stack uses:  5001 (backend), 8000 (frontend, no conflict)
#
# Prerequisites:
#   1. mkcert certs must exist in ./certs/ (api.ping.demo.crt / api.ping.demo.key)
#      Run: mkcert api.ping.demo  from the oauthPlayground directory
#   2. Add to /etc/hosts if not already there:
#        127.0.0.1  api.ping.demo
#   3. Copy .env.example → .env and fill in PingOne credentials (if not done)
#
# Usage:
#   docker compose up --build      # first run or after code changes
#   docker compose up              # subsequent runs
#   docker compose down            # stop and remove containers
#
# Access:
#   Frontend:  https://api.ping.demo:8000
#   Backend:   https://api.ping.demo:5001/api/health
#
# Logs:
#   docker compose logs -f oauth-backend
#   docker compose logs -f oauth-frontend

services:

  # ── Express backend (server.js) ───────────────────────────────────────────
  oauth-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: oauth-playground-backend
    ports:
      - "5001:5001"   # 5001 is taken by AI-Demo BFF; use 3011 on the host
    environment:
      NODE_ENV: production
      BACKEND_PORT: "5001"
      # Explicitly point to the mounted cert files so server.js uses them
      # instead of auto-generating a new self-signed cert on every start.
      SSL_CERT_PATH: "/app/certs/server.crt"
      SSL_KEY_PATH:  "/app/certs/server.key"
    env_file:
      - path: .env
        required: false   # graceful if .env is absent (fallback to .env.example values)
    volumes:
      - ./certs:/app/certs:ro
      # Persist the SQLite user database across restarts
      - oauth-data:/app/src/server/data
    networks:
      - oauth-playground
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Nginx frontend (Vite build) ───────────────────────────────────────────
  oauth-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: oauth-playground-frontend
    ports:
      - "8000:5000"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    networks:
      - oauth-playground
    depends_on:
      oauth-backend:
        condition: service_started
    restart: unless-stopped

volumes:
  oauth-data:
    name: oauth-playground-data

networks:
  oauth-playground:
    driver: bridge
    name: oauth-playground
