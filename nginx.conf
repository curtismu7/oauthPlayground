server {
    listen 3000 ssl;
    server_name api.ping.demo;

    # Certs are mounted from ./certs at runtime (docker-compose volume).
    # The api.ping.demo cert/key pair is used (not the auto-generated server.crt).
    ssl_certificate     /etc/nginx/certs/api.ping.demo.crt;
    ssl_certificate_key /etc/nginx/certs/api.ping.demo.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed Vite assets — immutable, cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA shell — never cache so deploys are picked up immediately
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: ws: wss: data: blob: 'unsafe-inline'; connect-src 'self' http: https: ws: wss:" always;
    }

    # API proxy to Express backend (HTTPS — self-signed cert inside container)
    location /api/ {
        proxy_pass https://oauth-backend:3001/api/;
        proxy_ssl_verify off;   # self-signed cert inside Docker network
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Auth callback landing (handled by React Router — falls through to /index.html)
    location /callback {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json
               application/xml image/svg+xml;
}
