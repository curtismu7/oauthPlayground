# Template ONLY — do not commit real secrets. run-k8.sh creates these imperatively
# from your local .env / ./certs / a generated key. Shown here for reference.
#
# 1) Encryption key (REQUIRED) + optional store-admin secret
apiVersion: v1
kind: Secret
metadata:
  name: oauth-enc
  namespace: oauth-playground
type: Opaque
stringData:
  # 32 bytes as 64 hex chars: `openssl rand -hex 32`
  PLAYGROUND_ENC_KEY: "REPLACE_WITH_64_HEX_CHARS"
  STORE_ADMIN_SECRET: "" # optional; gates /api/store/backup|restore via x-store-admin
---
# 2) App environment (the contents of your .env: PingOne client ids/secrets, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: oauth-env
  namespace: oauth-playground
type: Opaque
stringData:
  VITE_PINGONE_ENVIRONMENT_ID: "..."
  VITE_PINGONE_WORKER_CLIENT_ID: "..."
  VITE_PINGONE_WORKER_CLIENT_SECRET: "..."
  # ...rest of .env...
---
# 3) TLS cert + key (the backend + nginx both serve HTTPS)
apiVersion: v1
kind: Secret
metadata:
  name: oauth-certs
  namespace: oauth-playground
type: Opaque
stringData:
  server.crt: |
    -----BEGIN CERTIFICATE-----
    ...
  server.key: |
    -----BEGIN PRIVATE KEY-----
    ...
