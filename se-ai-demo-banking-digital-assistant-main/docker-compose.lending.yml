version: '3.8'

services:
  lending-api:
    build:
      context: ./lending_api_server
      dockerfile: Dockerfile
    container_name: lending-api-server
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - OAUTH_ISSUER_URL=${OAUTH_ISSUER_URL}
      - OAUTH_CLIENT_ID=${LENDING_OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${LENDING_OAUTH_CLIENT_SECRET}
      - SESSION_SECRET=${LENDING_SESSION_SECRET}
      - ENCRYPTION_KEY=${LENDING_ENCRYPTION_KEY}
      - CREDIT_SCORE_TTL=3600
      - DEFAULT_CREDIT_LIMIT=5000
      - MINIMUM_CREDIT_SCORE=600
    volumes:
      - lending_data:/app/data/persistent
      - lending_logs:/app/logs
    networks:
      - lending-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  lending-ui:
    build:
      context: ./lending_api_ui
      dockerfile: Dockerfile
    container_name: lending-ui-app
    ports:
      - "3003:3003"
    environment:
      - REACT_APP_API_URL=http://lending-api:3002
      - REACT_APP_OAUTH_CLIENT_ID=${LENDING_OAUTH_CLIENT_ID}
      - REACT_APP_OAUTH_ISSUER_URL=${OAUTH_ISSUER_URL}
    depends_on:
      lending-api:
        condition: service_healthy
    networks:
      - lending-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  lending_data:
    driver: local
  lending_logs:
    driver: local

networks:
  lending-network:
    driver: bridge