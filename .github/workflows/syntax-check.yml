name: Syntax & Type Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # The codebase carries a large baseline of pre-existing type errors, so a hard
    # `tsc --noEmit` gate is not yet achievable. The ratchet fails only if a change
    # INCREASES the count above .tsc-error-baseline — new code must be type-clean.
    # Lower the baseline (npm run type-check:ratchet -- --update) as errors get fixed.
    - name: Type check (ratchet — no new type errors)
      run: npm run type-check:ratchet
      
    - name: Biome check
      run: npm run check
      
    - name: ESLint check (async/promise rules)
      run: npm run lint:eslint
      
    - name: Build verification
      run: npm run build
