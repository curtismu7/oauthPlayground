name: Maintenance & Health Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      check_type:
        description: 'Type of check to run'
        required: true
        default: 'full'
        type: choice
        options:
          - health
          - security
          - quality
          - performance
          - full

jobs:
  health-check:
    runs-on: ubuntu-latest
    name: Health Check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run health check
        run: npm run health:check
        
      - name: Upload health check logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: health-check-logs
          path: logs/health-check.log

  security-check:
    runs-on: ubuntu-latest
    name: Security Audit
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run security audit
        run: npm audit --audit-level=high
        
      - name: Run security linting
        run: npx biome check --security-only
        
      - name: Check for security gate violations
        run: |
          echo "Checking for token-value-in-jsx violations..."
          if npx biome check --rule=security/noDangerouslySetInnerHtml 2>&1 | grep -q "token-value-in-jsx"; then
            echo "❌ Security gate violations detected"
            exit 1
          else
            echo "✅ No security gate violations found"
          fi

  code-quality-check:
    runs-on: ubuntu-latest
    name: Code Quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run code quality checks
        run: npm run maintenance:quality
        
      - name: Check for unused variables
        run: |
          echo "Checking for unused variables..."
          UNUSED_COUNT=$(npx biome check 2>&1 | grep -c "is assigned a value but never used" || echo "0")
          if [ "$UNUSED_COUNT" -gt 0 ]; then
            echo "❌ Found $UNUSED_COUNT unused variables"
            exit 1
          else
            echo "✅ No unused variables found"
          fi

  performance-check:
    runs-on: ubuntu-latest
    name: Performance
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sb dist | cut -f1)
          MAX_SIZE=$((10 * 1024 * 1024)) # 10MB
          if [ "$BUNDLE_SIZE" -gt "$MAX_SIZE" ]; then
            echo "❌ Bundle size too large: $(($BUNDLE_SIZE / 1024 / 1024))MB"
            exit 1
          else
            echo "✅ Bundle size acceptable: $(($BUNDLE_SIZE / 1024 / 1024))MB"
          fi
        
      - name: Analyze bundle
        run: npx vite-bundle-analyzer dist --mode json --output bundle-analysis.json
        
      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: bundle-analysis.json

  full-maintenance:
    runs-on: ubuntu-latest
    name: Full Maintenance
    if: github.event.inputs.check_type == 'full' || github.event_name == 'schedule'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run full maintenance
        run: npm run maintenance:full
        
      - name: Generate maintenance report
        run: |
          echo "# Maintenance Report" > maintenance-report.md
          echo "Generated on: $(date)" >> maintenance-report.md
          echo "" >> maintenance-report.md
          echo "## Health Check" >> maintenance-report.md
          npm run health:check >> maintenance-report.md 2>&1 || true
          echo "" >> maintenance-report.md
          echo "## Security Audit" >> maintenance-report.md
          npm audit --audit-level=high >> maintenance-report.md 2>&1 || true
          echo "" >> maintenance-report.md
          echo "## Code Quality" >> maintenance-report.md
          npm run check >> maintenance-report.md 2>&1 || true
          
      - name: Upload maintenance report
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-report
          path: maintenance-report.md

  notify-failure:
    runs-on: ubuntu-latest
    name: Notify on Failure
    if: failure()
    needs: [health-check, security-check, code-quality-check, performance-check]
    
    steps:
      - name: Create failure notification
        run: |
          echo "❌ Maintenance check failed!" 
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          
      - name: Create issue on failure (if on main)
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Maintenance Check Failed - ${new Date().toISOString()}`,
              body: `## Maintenance Check Failed\n\n**Repository**: ${{ github.repository }}\n**Branch**: ${{ github.ref }}\n**Commit**: ${{ github.sha }}\n**Workflow**: ${{ github.workflow }}\n**Run ID**: ${{ github.run_id }}\n\n### Failed Jobs\n${{ join(needs.*.result, '\n') }}\n\n### Next Steps\n1. Review the failed job logs\n2. Identify and fix the issues\n3. Ensure all maintenance checks pass\n4. Update documentation if needed\n\nThis issue was automatically created by the maintenance workflow.`,
              labels: ['maintenance', 'bug', 'automated']
            })

  success-summary:
    runs-on: ubuntu-latest
    name: Success Summary
    if: always() && needs.health-check.result == 'success' && needs.security-check.result == 'success' && needs.code-quality-check.result == 'success' && needs.performance-check.result == 'success'
    needs: [health-check, security-check, code-quality-check, performance-check]
    
    steps:
      - name: Create success summary
        run: |
          echo "✅ All maintenance checks passed successfully!"
          echo ""
          echo "## Summary"
          echo "- Health Check: ✅ PASSED"
          echo "- Security Audit: ✅ PASSED" 
          echo "- Code Quality: ✅ PASSED"
          echo "- Performance: ✅ PASSED"
          echo ""
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Timestamp: $(date)"
          
      - name: Update success badge
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Project is in perfect condition!"
